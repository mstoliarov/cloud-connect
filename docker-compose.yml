services:
  proxy:
    build: ./docker
    ports:
      - "${PROXY_PORT:-11436}:11436"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=${OLLAMA_PORT:-11434}
    volumes:
      - ./data:/data
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
